name: Update Dividend Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: '30 11 * * *'

permissions:
  contents: write

jobs:
  update-dividend-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update snapshot
        run: node scripts/update-dividend-snapshot.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dividendSnapshot.mjs
          git diff --cached --quiet || git commit -m "chore: update dividend snapshot"

      - name: Push changes
        run: git push
